{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Groovon</title>
    <link rel="stylesheet" href="{% static 'css/groovon.css' %}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>Groovon</h1>
                <p>Create your account</p>
            </div>

            {% if form.errors %}
            <ul class="error-list" style="margin-bottom: 20px;">
                {% for field, errors in form.errors.items %}
                    {% for error in errors %}
                    <li>{{ error }}</li>
                    {% endfor %}
                {% endfor %}
            </ul>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control"
                           placeholder="Choose a username" required autofocus>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password1" class="form-control"
                           placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="password2" class="form-control"
                           placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; justify-content: center;">
                    Create Account
                </button>
            </form>

            <p style="text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted);">
                Already have an account?
                <a href="{% url 'accounts:login' %}">Sign in →</a>
            </p>
        </div>
    </div>
</body>
</html>
